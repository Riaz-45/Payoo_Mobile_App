<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add daisyUI-css -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- add tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- add css link -->
    <link rel="stylesheet" href="tailwind.css">
    <!-- Outfit font add -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f4f5f7] h-[100vh] outfit flex flex-col justify-center items-center">
    <div  class="h-[130px] w-[300px] bg-[url(./assets/bg.png)] flex items-center justify-center">
        <img src="assets/Group.png" alt="">
    </div>
    <form class="bg-white rounded-3xl p-8 w-[400px]">
        <div class="">
            <label class="font-medium text-[16px]" for="">Mobile Number</label> <br>
            <input id="mobile-number" type="text" placeholder="Enter your number" class="input border-0 h-[50px] mt-4 w-full rounded-4xl bg-[#F4F5F7]" /> <br>
        </div>
        <div class="mt-4">
            <label class="font-medium text-[16px]" for="">4 Digit Pin</label> <br>
            <input id="pin-number" type="text" placeholder="Enter 4 DIgit Pin" class="input border-0 h-[50px] mt-4 w-full rounded-4xl bg-[#F4F5F7]" /> <br>
        </div>
            <button id="login-btn" class="btn outfit btn-active btn-primary border-0 text-white h-[50px] mt-4 w-full font-semibold text-[18px] rounded-4xl bg-[#0874F2]">Login</button>
    </form>
    
    <!-- js script link -->
    <script src="script.js"></script>
</body>
</html>
